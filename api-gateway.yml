server:
  port: 8087

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
        - id: HOTEL-SERVICE
          uri: lb://HOTEL-SERVICE
          predicates:
            - Path=/hotels/**,/staffs/**
        - id: RATING-SERVICE
          uri: lb://RATING-SERVICE
          predicates:
            - Path=/ratings/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-n6u7erw77d6ufb24.us.auth0.com/
      client:
        registration:
          auth0:
            client-id: aRJkQMhHWrxAJ3GI22mZtNnjbjnSJOuV
            client-secret: x9nQg3Sstf6DuSIrhEyxiUFGJt_jc0wijp1II9eDsEaHbKA3v6DQmwZMnS8P0QGM
            scope: openid, profile, email, offline_access
            provider: auth0
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/auth0"
        provider:
          auth0:
            issuer-uri: https://dev-n6u7erw77d6ufb24.us.auth0.com/

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
