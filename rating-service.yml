server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/rating_db

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-77584981.okta.com/oauth2/default
