server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/rating_db
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://<YOUR_AUTH0_DOMAIN>/
          audience: https://api.stayrate.com

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
