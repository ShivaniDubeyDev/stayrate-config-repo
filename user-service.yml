server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: Authority@01
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-n6u7erw77d6ufb24.us.auth0.com/
          audience: https://api.stayrate.com
      client:
        registration:
          my-internal-client:
            provider: auth0
            authorization-grant-type: client_credentials
            scope: internal
            client-id: <PASTE_M2M_APP_CLIENT_ID_HERE>
            client-secret: <PASTE_M2M_APP_CLIENT_SECRET_HERE>
        provider:
          auth0:
            token-uri: https://<YOUR_AUTH0_DOMAIN>/oauth/token
